name: OANDA EUR/USD V7-PLUS - Multi-Session Scalp

on:
  schedule:
    # Asian session: 01:00-06:00 UTC (09:00-14:00 SGT) Mon-Fri
    - cron: "*/5 1-5 * * 1-5"
    # London session: 07:00-12:00 UTC (15:00-20:00 SGT) Mon-Fri
    - cron: "*/5 7-11 * * 1-5"
    # NY session: 13:00-16:00 UTC (21:00-00:00 SGT) Mon-Thu
    - cron: "*/5 13-15 * * 1-4"
    # NY session Friday: only 13:xx UTC (bot self-stops before 14:00)
    - cron: "*/5 13 * * 5"
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore bot state from previous run so session_trades/cooldown persist
      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.ref }}
          restore-keys: bot-state-

      - name: Run Bot (single scan)
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      # Save updated state for next run
      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.ref }}-${{ github.run_id }}

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            bot_state.json
            trades_*.json
            performance_log.txt
          retention-days: 30
